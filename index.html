<!DOCTYPE html>
<html lang="fi" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.png" type="image/png">
<script src="script.js"></script>
<title>KouluAPP</title>
</head>

<body>

<header>
    <a href="index.html">
        <img src="logo.png" alt="Sivuston logo">
    </a>
</header>

<div id="login">

<h2>Kirjaudu sisään</h2>
<form id="loginForm">
    <input class="input" type="text" name="identifier" placeholder="Käyttäjänimi"><br>
    <input class="input" type="password" name="password" placeholder="Salasana"><br>
    <button id="loginButton" class="button" type="submit">Kirjaudu</button>
</form>

<h2>Rekisteröidy</h2>
<form id="registerForm">
    <input class="input" type="text" name="username" placeholder="Käyttäjänimi"><br>
    <input class="input" type="email" name="email" placeholder="Sähköposti"><br>
    <input class="input" type="password" name="password" placeholder="Salasana"><br>
    <button id="registerButton" class="button" type="submit">Rekisteröidy</button>
</form>

</div>

</body>
</html>
