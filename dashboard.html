<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="icon" href="images/favicon.png" type="image/png">

<title>Dashboard</title>
</head>

<body>

<!-- SESSION CHECK -->
<script>
const session = JSON.parse(localStorage.getItem("kouluapp_session"));

if (!session || !session.username) {
  window.location.href = "index.html";
}
</script>

<header>
  <a href="index.html">
    <img src="images/logo.png" alt="Sivuston logo">
  </a>

  <a class="header_link" href="dashboard.html">Dashboard</a>
  <a class="header_link" href="kokeet.html">Kokeet</a>
  <a class="header_link" href="todistus.html">Todistus</a>
  <a class="header_link" href="aikataulu.html">Aikataulu</a>
</header>

<!-- BACKUP -->
<div style="margin: 15px;">
  
  <button class="button" onclick="exportBackup()">Lataa backup</button>

  <!-- PIILOTETTU FILE INPUT -->
  <input type="file" id="backupFile" hidden>

  <!-- KAUNIS NAPPI -->
  <button class="button" onclick="document.getElementById('backupFile').click()">
    Valitse backup
  </button>

  <button class="button" onclick="importBackup()">Palauta backup</button>

</div>

<!-- WELCOME -->
<div id="dashboard">
  <h1 id="dashboard-welcome">Tervetuloa Dashboardille!</h1>
</div>

<!-- APPS -->
<div id="apit">

  <a id="todistus-button" href="todistus.html" class="app-button">
    <img src="images/Todistus.png" alt="Todistus">
    <span>Todistus</span>
  </a>

  <a id="kokeet-button" href="kokeet.html" class="app-button">
    <img src="images/Kokeet.png" alt="Kokeet">
    <span>Kokeet</span>
  </a>

  <a id="aikataulu-button" href="aikataulu.html" class="app-button">
    <img src="images/Aikataulu.png" alt="Aikataulu">
    <span>Aikataulu</span>
  </a>

  <a id="analytics-button" href="analytics.html" class="app-button">
    <img src="images/Analytics.png" alt="Analytics">
    <span>Analytics</span>

</div>

<!-- LOGOUT -->
<button class="button" id="logoutbutton" onclick="logout()">Kirjaudu ulos</button>

<!-- SCRIPT LADATAAN LOPUSSA -->
<script src="script.js"></script>

<script>
function logout() {
  localStorage.removeItem("kouluapp_session");
  window.location.href = "index.html";
}
</script>

</body>
</html>
